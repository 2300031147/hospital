# A generic, single database configuration.

[alembic]
script_location = %(here)s/alembic

path_separator = os

# BUG-6 FIX: Removed hardcoded placeholder "driver://user:pass@localhost/dbname".
# The actual URL is read from DATABASE_URL env var inside alembic/env.py.
# This prevents accidental connection attempts to a non-existent host.
sqlalchemy.url =

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
