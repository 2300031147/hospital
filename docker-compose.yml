services:
  postgres:
    image: postgres:16-alpine
    container_name: aerovhyn_postgres
    environment:
      POSTGRES_DB: aerovhyn
      POSTGRES_USER: aerovhyn
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-aerovhyn_secure_pw}
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aerovhyn -d aerovhyn"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: aerovhyn_redis
    ports:
      - "6379:6379"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: aerovhyn_backend
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - AEROVHYN_JWT_SECRET=${AEROVHYN_JWT_SECRET:-AEROVHYN_EDGE_SUPER_SECRET_KEY_999}
      - DATABASE_URL=postgresql://aerovhyn:${POSTGRES_PASSWORD:-aerovhyn_secure_pw}@postgres:5432/aerovhyn
      - REDIS_URL=redis://redis:6379
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:5173,http://localhost:5174,http://10.0.2.2:5173}
    ports:
      - "8000:8000"
    restart: unless-stopped

volumes:
  pg_data:
